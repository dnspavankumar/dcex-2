syntax = "proto3";

package com.exchange.gateway.dto;

option java_package = "com.exchange.gateway.dto";
option java_outer_classname = "OrderProto";

// gRPC Protocol Buffers definitions replacing JSON for internal 
// microservice-to-microservice communication
service OrderGatewayService {
    rpc SubmitOrder (OrderRequest) returns (OrderResponse);
    rpc CancelOrder (CancelRequest) returns (CancelResponse);
}

message OrderRequest {
    int64 user_id = 1;
    string symbol = 2;
    OrderSide side = 3;
    OrderType type = 4;
    double price = 5;       // In HFT, these are usually int64 fixed-point representations
    double quantity = 6;
    int64 client_order_id = 7;
}

message OrderResponse {
    int64 order_id = 1;
    bool accepted = 2;
    string reason = 3;
    int64 sequence_id = 4;
}

message CancelRequest {
    int64 order_id = 1;
    string symbol = 2;
    int64 user_id = 3;
}

message CancelResponse {
    bool success = 1;
}

enum OrderSide {
    BUY = 0;
    SELL = 1;
}

enum OrderType {
    LIMIT = 0;
    MARKET = 1;
}
